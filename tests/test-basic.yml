name: Test delete-artifact basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run delete-artifact action (no artifact exists, failOnError=false)
        id: action
        uses: .
        with:
          name: test-artifact
          failOnError: "false"
      - name: Assert action completed without error
        run: |
          echo "Action completed successfully (artifact not found is acceptable with failOnError=false)"
          echo "PASS"
