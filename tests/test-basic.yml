name: Test basic usage - delete artifact
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run delete-artifact action
        id: action
        uses: .
        with:
          name: test-artifact
          token: ${{ github.token }}
          failOnError: "false"
      - name: Assert action completed
        run: |
          echo "Action completed successfully (artifact may not exist, failOnError=false)"
          echo "PASS"
